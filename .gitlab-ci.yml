# ---------------------------------------------------------------------------
# STAGE 4: publish — load tarball → push to DockerHub (after clean scan)
# ---------------------------------------------------------------------------

.publish_template:
  stage: publish
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/docker:24.0.5
  services:
    - name: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/docker:24.0.5-dind
      alias: docker
  before_script:
    - docker login -u "$DOCKER_USER" -p "$DOCKER_PASSWORD"
  script:
    - export IMG_BASE="$DOCKER_USER/$DOCKER_REGISTRY-${SERVICE_NAME}"
    - export IMG_TAG="v${VERSION}-build.${CI_PIPELINE_IID}-${CI_COMMIT_SHORT_SHA}"
    - docker load < "${SERVICE_NAME}.tar"
    - docker tag "$IMG_BASE:ci-$CI_COMMIT_SHORT_SHA" "$IMG_BASE:latest"
    - docker tag "$IMG_BASE:ci-$CI_COMMIT_SHORT_SHA" "$IMG_BASE:$IMG_TAG"
    - docker push "$IMG_BASE:latest"
    - docker push "$IMG_BASE:$IMG_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

publish-user:
  extends: .publish_template
  variables:
    SERVICE_NAME: user-service
  needs: [build-user]

publish-ride:
  extends: .publish_template
  variables:
    SERVICE_NAME: ride-service
  needs: [build-ride]

publish-notification:
  extends: .publish_template
  variables:
    SERVICE_NAME: notification-service
  needs: [build-notification]

publish-dispatch:
  extends: .publish_template
