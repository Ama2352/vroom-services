# vroom-services/.gitlab-ci.yml
# Monorepo CI/CD Pipeline for Vroom Microservices
# Stage order: test → build → scan → publish → deploy
# Trivy scans the image tarball BEFORE any push to DockerHub

stages:
  # - test
  - build
  # - scan
  - publish
  # - deploy

variables:
  DOCKER_REGISTRY: "vroom-mvp"
  GITHUB_GITOPS_REPO: "Ama2352/vroom-gitops"
  VERSION: "1.0.0" # Base semantic version
  # Caching directories for Go
  GOPATH: "$CI_PROJECT_DIR/.go"
  GOCACHE: "$CI_PROJECT_DIR/.go/build-cache"
  # Enable Docker BuildKit for layer caching
  DOCKER_BUILDKIT: "1"
  # Docker-in-Docker settings
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  # Set these in GitLab CI/CD Variables (protected):
  # DOCKER_USER           — DockerHub username
  # DOCKER_PASSWORD       — DockerHub access token
  # GITHUB_GITOPS_TOKEN   — GitHub classic PAT (repo scope) with write access to vroom-gitops
  # SONAR_TOKEN           — From local SonarQube: My Account → Security → Generate Token
  # SONAR_HOST_URL        — http://<k3s-server-node-ip>:<sonarqube-nodeport>
  GIT_STRATEGY: clone
  GIT_DEPTH: 1

# ---------------------------------------------------------------------------
# STAGE 1: test
# ---------------------------------------------------------------------------

.go_test_template:
  stage: test
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/golang:1.25-alpine
  cache:
    key: "go-test-${SERVICE_PATH}-${CI_COMMIT_REF_SLUG}"
    paths:
      - .go/pkg/mod/
      - .go/build-cache/
  script:
    - cd "$SERVICE_PATH"
    - go test ./... -v -coverprofile=coverage.out -covermode=atomic
    - go tool cover -func=coverage.out
  artifacts:
    paths: ["$SERVICE_PATH/coverage.out"]
    expire_in: 1 hour
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

