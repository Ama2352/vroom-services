# vroom-services/.gitlab-ci.yml
# Monorepo CI/CD Pipeline for Vroom Microservices
# Stage order: test → build → publish → deploy
# Images pushed to GHCR only (ghcr.io/ama2352/vroom-mvp-*) — Kargo polls GHCR, no rate limits

include:
  - template: Security/SAST.gitlab-ci.yml

stages:
  - test
  - integration
  - build
  # - scan
  - publish
  - deploy

variables:
  IMG_PREFIX: "ghcr.io/ama2352/vroom-mvp"
  GITHUB_GITOPS_REPO: "Ama2352/vroom-gitops"
  # Required GitLab CI/CD Variables (Settings → CI/CD → Variables, protected):
  # GHCR_USER             — GitHub username (ama2352)
  # GHCR_TOKEN            — GitHub PAT with write:packages scope
  # GITHUB_GITOPS_TOKEN   — GitHub classic PAT (repo scope) for vroom-gitops push
  VERSION: "1.0.0"
  GOPATH: "$CI_PROJECT_DIR/.go"
  GOCACHE: "$CI_PROJECT_DIR/.go/build-cache"
  DOCKER_BUILDKIT: "1"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  GIT_STRATEGY: clone
  GIT_DEPTH: 1

# ---------------------------------------------------------------------------
# STAGE 1: test
# ---------------------------------------------------------------------------

.go_test_template:
  stage: test
  image: mirror.gcr.io/library/golang:1.25-alpine
  cache:
    key: "go-test-${SERVICE_PATH}-${CI_COMMIT_REF_SLUG}"
    paths:
      - .go/pkg/mod/
      - .go/build-cache/
  script:
    - cd "$SERVICE_PATH"
    - go test ./... -v -coverprofile=coverage.out -covermode=atomic
    - go tool cover -func=coverage.out
  artifacts:
    paths: ["$SERVICE_PATH/coverage.out"]
    expire_in: 1 hour
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test-user:
  extends: .go_test_template
  variables:
    SERVICE_PATH: user
  allow_failure: true

test-ride:
  extends: .go_test_template
  variables:
    SERVICE_PATH: ride
  allow_failure: false # trip_test.go exists and must pass

test-dispatch:
  extends: .go_test_template
  variables:
    SERVICE_PATH: dispatch
  allow_failure: true

test-notification:
  extends: .go_test_template
  variables:
    SERVICE_PATH: notification
  allow_failure: true

gosec:
  stage: test
  image: mirror.gcr.io/library/golang:1.25-alpine
  cache:
    key: "go-gosec-${CI_COMMIT_REF_SLUG}"
    paths:
      - .go/pkg/mod/
      - .go/build-cache/
      - .go/bin/
  before_script:
    - export PATH="$CI_PROJECT_DIR/.go/bin:$PATH"
    - command -v gosec || go install github.com/securego/gosec/v2/cmd/gosec@latest
  script:
    - for svc in user ride dispatch notification; do
        cd "$svc" && gosec -fmt=sarif -out="../gosec-$svc.sarif" ./... || true && cd ..;
      done
  artifacts:
    reports:
      sast:
        - gosec-ride.sarif
        - gosec-user.sarif
        - gosec-dispatch.sarif
        - gosec-notification.sarif
    when: always
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ---------------------------------------------------------------------------
# STAGE 2: integration — testcontainers tests (Docker-in-Docker required)
# Runs after unit tests; gated on ride unit tests passing.
# Uses -tags integration to activate testcontainers-backed test files.
# ---------------------------------------------------------------------------

.integration_test_template:
  stage: integration
  image: mirror.gcr.io/library/golang:1.25-alpine
  services:
    - name: mirror.gcr.io/library/docker:24.0.5-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    GOPATH: "$CI_PROJECT_DIR/.go"
    GOCACHE: "$CI_PROJECT_DIR/.go/build-cache"
    # Disable Ryuk (reaper container) — dind has no reachable Docker socket for it
    RYUK_DISABLED: "true"
  cache:
    key: "go-integration-${SERVICE_PATH}-${CI_COMMIT_REF_SLUG}"
    paths:
      - .go/pkg/mod/
      - .go/build-cache/
  script:
    - cd "$SERVICE_PATH"
    - go test ./internal/integration/... -tags integration -v -timeout 120s
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

integration-ride:
  extends: .integration_test_template
  variables:
    SERVICE_PATH: ride
  needs: [test-ride]
  allow_failure: false

integration-dispatch:
  extends: .integration_test_template
  variables:
    SERVICE_PATH: dispatch
  needs: [test-dispatch]
  allow_failure: false

# ---------------------------------------------------------------------------
# STAGE 2: build — docker build → .tar artifact (NO push to registry yet)
# ---------------------------------------------------------------------------

.build_template:
  stage: build
  image: mirror.gcr.io/library/docker:24.0.5
  services:
    - name: mirror.gcr.io/library/docker:24.0.5-dind
      alias: docker
  before_script:
    - docker login ghcr.io -u "$GHCR_USER" -p "$GHCR_TOKEN"
  script:
    - export IMG_BASE="${IMG_PREFIX}-${SERVICE_NAME}"
    - export IMG="$IMG_BASE:ci-$CI_COMMIT_SHORT_SHA"
    - docker pull "$IMG_BASE:latest" || true
    - export BP_ARG="--build-arg BASE_IMAGE_PREFIX=mirror.gcr.io/library/"
    - cd "$SERVICE_PATH"
    - docker build $BP_ARG --build-arg BUILDKIT_INLINE_CACHE=1 --cache-from "$IMG_BASE:latest" -t "$IMG" .
    - docker save "$IMG" > "../${SERVICE_NAME}.tar"
  artifacts:
    paths: ["${SERVICE_NAME}.tar"]
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

build-user:
  extends: .build_template
  variables:
    SERVICE_NAME: user-service
    SERVICE_PATH: user

build-ride:
  extends: .build_template
  variables:
    SERVICE_NAME: ride-service
    SERVICE_PATH: ride

build-notification:
  extends: .build_template
  variables:
    SERVICE_NAME: notification-service
    SERVICE_PATH: notification

build-dispatch:
  extends: .build_template
  variables:
    SERVICE_NAME: dispatch-service
    SERVICE_PATH: dispatch

build-frontend:
  extends: .build_template
  variables:
    SERVICE_NAME: frontend
    SERVICE_PATH: frontend

