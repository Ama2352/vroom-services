# vroom-services/.gitlab-ci.yml
# Monorepo CI/CD Pipeline for Vroom Microservices

stages:
  - build
  - publish
  - deploy

variables:
  DOCKER_REGISTRY: "vroom-mvp"
  GITOPS_REPO: "vroom-app/gitops"
  # Set these in GitLab CI/CD Variables:
  # DOCKER_USER: <your-dockerhub-username>
  # DOCKER_PASSWORD: <your-dockerhub-token>
  # GITOPS_TOKEN: <gitlab-access-token-to-push>

.service_template:
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u "$DOCKER_USER" -p "$DOCKER_PASSWORD"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

# --- PUBLISH JOBS ---

.publish_template:
  extends: .service_template
  stage: publish
  script:
    - cd "$SERVICE_PATH"
    - export IMAGE_NAME="$DOCKER_USER/$DOCKER_REGISTRY-${SERVICE_NAME}"
    - docker build -t "$IMAGE_NAME:latest" -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" .
    - docker push "$IMAGE_NAME:latest"
    - docker push "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"

publish-user:
  extends: .publish_template
  variables:
    SERVICE_NAME: "user-service"
    SERVICE_PATH: "user"

publish-ride:
  extends: .publish_template
  variables:
    SERVICE_NAME: "ride-service"
    SERVICE_PATH: "ride"

publish-notification:
  extends: .publish_template
  variables:
    SERVICE_NAME: "notification-service"
    SERVICE_PATH: "notification"

publish-dispatch:
  extends: .publish_template
  variables:
    SERVICE_NAME: "dispatch-service"
    SERVICE_PATH: "dispatch"

# --- GITOPS DEPLOY JOB ---

deploy-gitops:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git curl bash
    - curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
    - mv kustomize /usr/local/bin/
  script:
    - |
      set -e
      git config --global user.email "ci@vroom-platform.com"
      git config --global user.name "Vroom CI Bot"
      git clone "https://oauth2:${GITOPS_TOKEN}@gitlab.com/${GITOPS_REPO}.git" gitops-repo
      cd gitops-repo/apps
      
      for service in user ride notification dispatch; do
        echo "Updating image for $service to $CI_COMMIT_SHORT_SHA"
        cd "$service/overlays/dev"
        # Bridge the k3s manifest name (vroom-mvp/user-service) to the DockerHub build name (user-service)
        kustomize edit set image "vroom-mvp/${service}-service=$DOCKER_USER/$DOCKER_REGISTRY-${service}-service:$CI_COMMIT_SHORT_SHA"
        cd ../../..
      done
      
      git add .
      git commit -m "chore(gitops): update images to $CI_COMMIT_SHORT_SHA [skip ci]" || true
      git push origin main
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
