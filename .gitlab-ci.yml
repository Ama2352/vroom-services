# ---------------------------------------------------------------------------
# STAGE 2: build — docker build → .tar artifact (NO push to registry yet)
# ---------------------------------------------------------------------------

.build_template:
  stage: build
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/docker:24.0.5
  services:
    - name: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/docker:24.0.5-dind
      alias: docker
  before_script:
    - docker login -u "$DOCKER_USER" -p "$DOCKER_PASSWORD"
  script:
    - export IMG_BASE="$DOCKER_USER/$DOCKER_REGISTRY-${SERVICE_NAME}"
    - export IMG="$IMG_BASE:ci-$CI_COMMIT_SHORT_SHA"
    - docker pull "$IMG_BASE:latest" || true
    - export BP_ARG=$( [ -n "$CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX" ] && echo "--build-arg BASE_IMAGE_PREFIX=${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/" || echo "" )
    - cd "$SERVICE_PATH"
    - docker build $BP_ARG --build-arg BUILDKIT_INLINE_CACHE=1 --cache-from "$IMG_BASE:latest" -t "$IMG" .
    - docker save "$IMG" > "../${SERVICE_NAME}.tar"
  artifacts:
    paths: ["${SERVICE_NAME}.tar"]
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

build-user:
  extends: .build_template
  variables:
    SERVICE_NAME: user-service
    SERVICE_PATH: user

build-ride:
  extends: .build_template
  variables:
    SERVICE_NAME: ride-service
    SERVICE_PATH: ride

build-notification:
  extends: .build_template
  variables:
    SERVICE_NAME: notification-service
    SERVICE_PATH: notification

build-dispatch:
  extends: .build_template
  variables:
    SERVICE_NAME: dispatch-service
    SERVICE_PATH: dispatch

build-frontend:
  extends: .build_template
  variables:
    SERVICE_NAME: frontend
    SERVICE_PATH: frontend

build-ai-reporter:
  extends: .build_template
  variables:
    SERVICE_NAME: ai-reporter
    SERVICE_PATH: ai-reporter

# ---------------------------------------------------------------------------
# STAGE 3: scan — Trivy on tarball + SonarQube (in parallel)
# Trivy MUST pass before anything is pushed to DockerHub
# ---------------------------------------------------------------------------

.trivy_template:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    # Informational: show HIGH findings without failing
    - trivy image --input "${SERVICE_NAME}.tar" --exit-code 0 --severity HIGH --format table
    # Hard fail on CRITICAL CVEs — blocks the publish stage
    - trivy image --input "${SERVICE_NAME}.tar" --exit-code 1 --severity CRITICAL --format sarif --output "trivy-${SERVICE_NAME}.sarif"
  artifacts:
    reports:
      container_scanning: "trivy-${SERVICE_NAME}.sarif"
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

