# ---------------------------------------------------------------------------
# STAGE 5: deploy — update GitOps repo → ArgoCD syncs dev overlay
# ---------------------------------------------------------------------------

deploy-gitops:
  stage: deploy
  image: alpine/k8s:1.36.0
  before_script:
    - git config --global user.email "ci@vroom-platform.com"
    - git config --global user.name "Vroom CI Bot"
  script:
    - |
      set -e
      git clone "https://x-access-token:${GITHUB_GITOPS_TOKEN}@github.com/${GITHUB_GITOPS_REPO}.git" gitops-repo
      cd gitops-repo/apps

      for service in user ride notification dispatch frontend; do
        echo "Updating $service → ${IMG_PREFIX}-*:$CI_COMMIT_SHORT_SHA"
        cd "$service/overlays/dev"
        if [ "$service" == "frontend" ]; then
          kustomize edit set image "vroom-mvp/frontend=${IMG_PREFIX}-frontend:$CI_COMMIT_SHORT_SHA"
        else
          kustomize edit set image "vroom-mvp/${service}-service=${IMG_PREFIX}-${service}-service:$CI_COMMIT_SHORT_SHA"
        fi
        cd ../../..
      done

      git add .
      git commit -m "chore(gitops): update images to $CI_COMMIT_SHORT_SHA [skip ci]" || true
      git push origin main
  needs:
    [
      publish-user,
      publish-ride,
      publish-notification,
      publish-dispatch,
      publish-frontend,
    ]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ---------------------------------------------------------------------------
# AI Agent services — build + publish (Python, no Go tests needed)
# ---------------------------------------------------------------------------

build-runbook-retriever:
  extends: .build_template
  variables:
    SERVICE_NAME: runbook-retriever
    SERVICE_PATH: runbook-retriever

build-kubectl-executor:
  extends: .build_template
  variables:
    SERVICE_NAME: kubectl-executor
    SERVICE_PATH: kubectl-executor

publish-runbook-retriever:
  extends: .publish_template
  variables:
    SERVICE_NAME: runbook-retriever
  needs: [build-runbook-retriever]

publish-kubectl-executor:
  extends: .publish_template
  variables:
    SERVICE_NAME: kubectl-executor
  needs: [build-kubectl-executor]
