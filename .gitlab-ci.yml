# vroom-services/.gitlab-ci.yml
# Monorepo CI/CD Pipeline for Vroom Microservices
# Stage order: test → integration → build → publish → deploy
# Images are pushed to GHCR only (ghcr.io/ama2352/vroom-mvp-*).
# This refactor intentionally keeps CI simple:
# - keep only Go module cache
# - remove Docker layer cache / inline cache
# - use standard Docker Hub images instead of mirror.gcr.io

include:
  - template: Security/SAST.gitlab-ci.yml

stages:
  - test
  - integration
  - build
  - scan
  - publish
  - deploy

variables:
  IMG_PREFIX: "ghcr.io/ama2352/vroom-mvp"
  GITHUB_GITOPS_REPO: "Ama2352/vroom-gitops"

  # Required GitLab CI/CD Variables (Settings → CI/CD → Variables, protected):
  # GHCR_USER             — GitHub username (ama2352)
  # GHCR_TOKEN            — GitHub PAT with write:packages scope
  # GITHUB_GITOPS_TOKEN   — GitHub classic PAT (repo scope) for vroom-gitops push

  VERSION: "1.0.0"
  GOPATH: "$CI_PROJECT_DIR/.go"
  DOCKER_BUILDKIT: "1"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  GIT_STRATEGY: clone
  GIT_DEPTH: 1

# ---------------------------------------------------------------------------
# STAGE 1: test
# ---------------------------------------------------------------------------

.go_test_template:
  stage: test
  image: golang:1.25-alpine
  cache:
    key: "go-mod-${SERVICE_PATH}-${CI_COMMIT_REF_SLUG}"
    paths:
      - .go/pkg/mod/
  script:
    - cd "$SERVICE_PATH"
    - go test ./... -v -coverprofile=coverage.out -covermode=atomic
    - go tool cover -func=coverage.out
  artifacts:
    paths: ["$SERVICE_PATH/coverage.out"]
    expire_in: 1 hour
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test-user:
  extends: .go_test_template
  variables:
    SERVICE_PATH: services/user
  allow_failure: true

test-ride:
  extends: .go_test_template
  variables:
    SERVICE_PATH: services/ride
  allow_failure: false

test-dispatch:
  extends: .go_test_template
  variables:
    SERVICE_PATH: services/dispatch
  allow_failure: true

test-notification:
  extends: .go_test_template
  variables:
    SERVICE_PATH: services/notification
  allow_failure: true

gosec:
  stage: test
  image: golang:1.25-alpine
  cache:
    key: "go-mod-gosec-${CI_COMMIT_REF_SLUG}"
    paths:
      - .go/pkg/mod/
  before_script:
    - apk add --no-cache jq
    - go install github.com/securego/gosec/v2/cmd/gosec@latest
  script:
    - for svc in user ride dispatch notification; do
        cd "services/$svc" && "$GOPATH/bin/gosec" -fmt=sarif -out="../../gosec-$svc.sarif" ./... || true && cd ../..;
      done
    - jq -s '{version:"2.1.0","$schema":.[0]["$schema"],runs:[.[].runs[]]}' gosec-*.sarif > gosec-merged.sarif
  artifacts:
    reports:
      sast: gosec-merged.sarif
    when: always
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ---------------------------------------------------------------------------
# STAGE 2: integration — testcontainers tests (Docker-in-Docker required)
# ---------------------------------------------------------------------------

.integration_test_template:
  stage: integration
  image: golang:1.25-alpine
  services:
    - name: docker:24.0.5-dind
      alias: docker
  variables:
    RYUK_DISABLED: "true"
  cache:
    key: "go-mod-integration-${SERVICE_PATH}-${CI_COMMIT_REF_SLUG}"
    paths:
      - .go/pkg/mod/
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

integration-ride:
  extends: .integration_test_template
  variables:
    SERVICE_PATH: services/ride
  script:
    - cd "$SERVICE_PATH"
    - go test ./tests/outbox/... ./tests/saga/... -tags integration -v -timeout 300s
  needs: [test-ride]
  allow_failure: false

integration-dispatch:
  extends: .integration_test_template
  variables:
    SERVICE_PATH: services/dispatch
  script:
    - cd "$SERVICE_PATH"
    - go test ./tests/geo/... ./tests/saga/... ./tests/consumer/... -tags integration -v -timeout 300s
  needs: [test-dispatch]
  allow_failure: false

integration-choreography:
  extends: .integration_test_template
  variables:
    SERVICE_PATH: services/tests
  script:
    - cd "$SERVICE_PATH"
    - go test ./choreography/... -tags integration -v -timeout 300s
  needs: [integration-ride, integration-dispatch]
  allow_failure: false

# ---------------------------------------------------------------------------
# STAGE 3: build — docker build → .tar artifact, no registry push yet
# ---------------------------------------------------------------------------

.build_template:
  stage: build
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      alias: docker
  before_script:
    - docker login ghcr.io -u "$GHCR_USER" -p "$GHCR_TOKEN"
  script:
    - export IMG_BASE="${IMG_PREFIX}-${SERVICE_NAME}"
    - export IMG="$IMG_BASE:ci-$CI_COMMIT_SHORT_SHA"
    - cd "$SERVICE_PATH"
    - docker build --build-arg BASE_IMAGE_PREFIX="public.ecr.aws/docker/library/" -t "$IMG" .
    - docker save "$IMG" > "$CI_PROJECT_DIR/${SERVICE_NAME}.tar"
  artifacts:
    paths: ["${SERVICE_NAME}.tar"]
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

build-user:
  extends: .build_template
  variables:
    SERVICE_NAME: user-service
    SERVICE_PATH: services/user

build-ride:
  extends: .build_template
  variables:
    SERVICE_NAME: ride-service
    SERVICE_PATH: services/ride

build-notification:
  extends: .build_template
  variables:
    SERVICE_NAME: notification-service
    SERVICE_PATH: services/notification

build-dispatch:
  extends: .build_template
  variables:
    SERVICE_NAME: dispatch-service
    SERVICE_PATH: services/dispatch

build-frontend:
  extends: .build_template
  variables:
    SERVICE_NAME: frontend
    SERVICE_PATH: services/frontend

# ---------------------------------------------------------------------------
# STAGE 4: scan — Trivy vulnerability scan on built .tar artifacts
# ---------------------------------------------------------------------------

.trivy_template:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --input "${SERVICE_NAME}.tar"
        --exit-code 0
        --severity HIGH,CRITICAL
        --ignore-unfixed
        --format table
    - trivy image --input "${SERVICE_NAME}.tar"
        --exit-code 0
        --severity HIGH,CRITICAL
        --ignore-unfixed
        --format sarif
        --output "trivy-${SERVICE_NAME}.sarif"
  artifacts:
    reports:
      container_scanning: "trivy-${SERVICE_NAME}.sarif"
    when: always
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

scan-user:
  extends: .trivy_template
  variables:
    SERVICE_NAME: user-service
  needs: [build-user]

scan-ride:
  extends: .trivy_template
  variables:
    SERVICE_NAME: ride-service
  needs: [build-ride]

scan-notification:
  extends: .trivy_template
  variables:
    SERVICE_NAME: notification-service
  needs: [build-notification]

scan-dispatch:
  extends: .trivy_template
  variables:
    SERVICE_NAME: dispatch-service
  needs: [build-dispatch]

scan-frontend:
  extends: .trivy_template
  variables:
    SERVICE_NAME: frontend
  needs: [build-frontend]

scan-runbook-retriever:
  extends: .trivy_template
  variables:
    SERVICE_NAME: runbook-retriever
  needs: [build-runbook-retriever]

scan-kubectl-executor:
  extends: .trivy_template
  variables:
    SERVICE_NAME: kubectl-executor
  needs: [build-kubectl-executor]

# ---------------------------------------------------------------------------
# STAGE 4: publish — load tarball → push to GHCR
# ---------------------------------------------------------------------------

.publish_template:
  stage: publish
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      alias: docker
  before_script:
    - docker login ghcr.io -u "$GHCR_USER" -p "$GHCR_TOKEN"
  script:
    - export IMG_BASE="${IMG_PREFIX}-${SERVICE_NAME}"
    - export IMG_TAG="v${VERSION}-build.${CI_PIPELINE_IID}-${CI_COMMIT_SHORT_SHA}"
    - docker load < "${SERVICE_NAME}.tar"
    - docker tag "$IMG_BASE:ci-$CI_COMMIT_SHORT_SHA" "$IMG_BASE:latest"
    - docker tag "$IMG_BASE:ci-$CI_COMMIT_SHORT_SHA" "$IMG_BASE:$IMG_TAG"
    - docker tag "$IMG_BASE:ci-$CI_COMMIT_SHORT_SHA" "$IMG_BASE:$CI_COMMIT_SHORT_SHA"
    - docker push "$IMG_BASE:latest"
    - docker push "$IMG_BASE:$IMG_TAG"
    - docker push "$IMG_BASE:$CI_COMMIT_SHORT_SHA"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

publish-user:
  extends: .publish_template
  variables:
    SERVICE_NAME: user-service
  needs: [build-user, scan-user]

publish-ride:
  extends: .publish_template
  variables:
    SERVICE_NAME: ride-service
  needs: [build-ride, scan-ride]

publish-notification:
  extends: .publish_template
  variables:
    SERVICE_NAME: notification-service
  needs: [build-notification, scan-notification]

publish-dispatch:
  extends: .publish_template
  variables:
    SERVICE_NAME: dispatch-service
  needs: [build-dispatch, scan-dispatch]

publish-frontend:
  extends: .publish_template
  variables:
    SERVICE_NAME: frontend
  needs: [build-frontend, scan-frontend]

# ---------------------------------------------------------------------------
# AI Agent services — build + publish (Python, no Go tests needed)
# ---------------------------------------------------------------------------

build-runbook-retriever:
  extends: .build_template
  variables:
    SERVICE_NAME: runbook-retriever
    SERVICE_PATH: ai-agent/runbook-retriever

build-kubectl-executor:
  extends: .build_template
  variables:
    SERVICE_NAME: kubectl-executor
    SERVICE_PATH: ai-agent/kubectl-executor

publish-runbook-retriever:
  extends: .publish_template
  variables:
    SERVICE_NAME: runbook-retriever
  needs: [build-runbook-retriever, scan-runbook-retriever]

publish-kubectl-executor:
  extends: .publish_template
  variables:
    SERVICE_NAME: kubectl-executor
  needs: [build-kubectl-executor, scan-kubectl-executor]
