# vroom-services/.gitlab-ci.yml
# Monorepo CI/CD Pipeline for Vroom Microservices
# Stage order: test → integration → build → publish → deploy
# Images are pushed to GHCR only (ghcr.io/ama2352/vroom-mvp-*).
# This refactor intentionally keeps CI simple:
# - keep only Go module cache
# - remove Docker layer cache / inline cache
# - use standard Docker Hub images instead of mirror.gcr.io

include:
  - template: Security/SAST.gitlab-ci.yml

stages:
  - test
  - integration
  - build
  # - scan
  - publish
  - deploy

variables:
  IMG_PREFIX: "ghcr.io/ama2352/vroom-mvp"
  GITHUB_GITOPS_REPO: "Ama2352/vroom-gitops"

  # Required GitLab CI/CD Variables (Settings → CI/CD → Variables, protected):
  # GHCR_USER             — GitHub username (ama2352)
  # GHCR_TOKEN            — GitHub PAT with write:packages scope
  # GITHUB_GITOPS_TOKEN   — GitHub classic PAT (repo scope) for vroom-gitops push

  VERSION: "1.0.0"
  GOPATH: "$CI_PROJECT_DIR/.go"
  DOCKER_BUILDKIT: "1"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  GIT_STRATEGY: clone
  GIT_DEPTH: 1

# ---------------------------------------------------------------------------
# STAGE 1: test
# ---------------------------------------------------------------------------

.go_test_template:
  stage: test
  image: golang:1.25-alpine
  cache:
    key: "go-mod-${SERVICE_PATH}-${CI_COMMIT_REF_SLUG}"
    paths:
      - .go/pkg/mod/
  script:
    - cd "$SERVICE_PATH"
    - go test ./... -v -coverprofile=coverage.out -covermode=atomic
    - go tool cover -func=coverage.out
  artifacts:
    paths: ["$SERVICE_PATH/coverage.out"]
    expire_in: 1 hour
    when: always
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test-user:
  extends: .go_test_template
  variables:
    SERVICE_PATH: user
  allow_failure: true

test-ride:
  extends: .go_test_template
  variables:
    SERVICE_PATH: ride
  allow_failure: false

test-dispatch:
  extends: .go_test_template
  variables:
    SERVICE_PATH: dispatch
  allow_failure: true

test-notification:
  extends: .go_test_template
  variables:
    SERVICE_PATH: notification
  allow_failure: true

gosec:
  stage: test
  image: golang:1.25-alpine
  cache:
    key: "go-mod-gosec-${CI_COMMIT_REF_SLUG}"
    paths:
      - .go/pkg/mod/
  before_script:
    - go install github.com/securego/gosec/v2/cmd/gosec@latest
  script:
    - for svc in user ride dispatch notification; do
        cd "$svc" && "$GOPATH/bin/gosec" -fmt=sarif -out="../gosec-$svc.sarif" ./... || true && cd ..;
      done
  artifacts:
    reports:
      sast:
        - gosec-ride.sarif
        - gosec-user.sarif
        - gosec-dispatch.sarif
        - gosec-notification.sarif
    when: always
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ---------------------------------------------------------------------------
# STAGE 2: integration — testcontainers tests (Docker-in-Docker required)
# ---------------------------------------------------------------------------

.integration_test_template:
  stage: integration
  image: golang:1.25-alpine
  services:
    - name: docker:24.0.5-dind
      alias: docker
  variables:
    RYUK_DISABLED: "true"
  cache:
    key: "go-mod-integration-${SERVICE_PATH}-${CI_COMMIT_REF_SLUG}"
    paths:
      - .go/pkg/mod/
  script:
    - cd "$SERVICE_PATH"
    - go test ./internal/integration/... -tags integration -v -timeout 120s
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

integration-ride:
  extends: .integration_test_template
  variables:
    SERVICE_PATH: ride
  needs: [test-ride]
  allow_failure: false

integration-dispatch:
  extends: .integration_test_template
  variables:
    SERVICE_PATH: dispatch
  needs: [test-dispatch]
  allow_failure: false

# ---------------------------------------------------------------------------
# STAGE 3: build — docker build → .tar artifact, no registry push yet
# ---------------------------------------------------------------------------

.build_template:
  stage: build
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      alias: docker
  before_script:
    - docker login ghcr.io -u "$GHCR_USER" -p "$GHCR_TOKEN"
  script:
    - export IMG_BASE="${IMG_PREFIX}-${SERVICE_NAME}"
    - export IMG="$IMG_BASE:ci-$CI_COMMIT_SHORT_SHA"
    - cd "$SERVICE_PATH"
    # Keep BASE_IMAGE_PREFIX empty so Dockerfiles using ${BASE_IMAGE_PREFIX} resolve to Docker Hub.
    - docker build --build-arg BASE_IMAGE_PREFIX= -t "$IMG" .
    - docker save "$IMG" > "../${SERVICE_NAME}.tar"
  artifacts:
    paths: ["${SERVICE_NAME}.tar"]
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

build-user:
  extends: .build_template
  variables:
    SERVICE_NAME: user-service
    SERVICE_PATH: user

build-ride:
  extends: .build_template
  variables:
    SERVICE_NAME: ride-service
    SERVICE_PATH: ride

build-notification:
  extends: .build_template
  variables:
    SERVICE_NAME: notification-service
    SERVICE_PATH: notification

build-dispatch:
  extends: .build_template
  variables:
    SERVICE_NAME: dispatch-service
    SERVICE_PATH: dispatch

build-frontend:
  extends: .build_template
  variables:
    SERVICE_NAME: frontend
    SERVICE_PATH: frontend

