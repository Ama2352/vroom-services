sonar.projectKey=vroom-mvp
sonar.projectName=Vroom MVP
sonar.sourceEncoding=UTF-8

# Source directories — relative to sonar.projectBaseDir (vroom-services/)
sonar.sources=user,ride,dispatch,notification
sonar.exclusions=**/db/**,**/*_test.go,**/vendor/**

# Coverage reports produced by go test -coverprofile in CI test jobs
sonar.go.coverage.reportPaths=user/coverage.out,ride/coverage.out,dispatch/coverage.out,notification/coverage.out

# Targets the in-cluster SonarQube instance (not SonarCloud)
# SONAR_HOST_URL must be set to http://192.168.242.10/sonarqube in GitLab CI/CD Variables
